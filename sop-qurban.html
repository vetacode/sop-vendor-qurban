<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOP Kurban - Vet Control Panel</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Framer Motion (via CDN workaround using motion.dev UMD) -->
    <script src="https://unpkg.com/motion@10.16.4/dist/motion.umd.js"></script>
  </head>

  <body class="bg-gray-100 font-sans">
    <div class="max-w-6xl mx-auto p-6">
      <!-- HEADER -->
      <div class="bg-white rounded-2xl shadow p-6 mb-6">
        <h1 class="text-2xl font-bold flex items-center gap-3">
          <i class="fa-solid fa-stethoscope text-blue-600"></i>
          SOP Pengawasan Hewan Kurban
        </h1>
        <p class="text-gray-600 mt-2">
          Dashboard Dokter Hewan - Kontrol Lapangan
        </p>
      </div>

      <!-- PROGRESS -->
      <div class="bg-white rounded-2xl shadow p-6 mb-6">
        <h2 class="font-semibold mb-2">Progress Checklist</h2>
        <div class="w-full bg-gray-200 rounded-full h-4">
          <div
            id="progressBar"
            class="bg-green-500 h-4 rounded-full w-0 transition-all"
          ></div>
        </div>
        <p class="text-sm mt-2 text-gray-500">
          <span id="progressText">0%</span> selesai
        </p>
      </div>

      <!-- SOP FLOW -->
      <div class="bg-white rounded-2xl shadow p-6 mb-6">
        <h2 class="font-semibold mb-4">Alur SOP</h2>

        <ol class="space-y-3">
          <li class="flex items-center gap-3">
            <i class="fa fa-check-circle text-green-500"></i> Seleksi Vendor
          </li>
          <li class="flex items-center gap-3">
            <i class="fa fa-check-circle text-green-500"></i> Pemeriksaan Hewan
          </li>
          <li class="flex items-center gap-3">
            <i class="fa fa-check-circle text-green-500"></i> Pemotongan
          </li>
          <li class="flex items-center gap-3">
            <i class="fa fa-check-circle text-green-500"></i> Post-Mortem
          </li>
          <li class="flex items-center gap-3">
            <i class="fa fa-check-circle text-green-500"></i> Distribusi
          </li>
        </ol>
      </div>

      <!-- CHECKLIST -->
      <div class="grid md:grid-cols-2 gap-6">
        <!-- VENDOR -->
        <div class="bg-white rounded-2xl shadow p-6">
          <h3 class="font-semibold mb-4 text-blue-600">Seleksi Vendor</h3>

          <div class="space-y-3 checklist">
            <label><input type="checkbox" class="chk" /> SKKH tersedia</label
            ><br />
            <label
              ><input type="checkbox" class="chk" /> Terdaftar iSIKHNAS</label
            ><br />
            <label
              ><input type="checkbox" class="chk" /> Asal ternak jelas</label
            ><br />
            <label
              ><input type="checkbox" class="chk" /> Tidak ada penyakit</label
            ><br />
          </div>

          <div class="mt-4">
            <label>Skor Vendor:</label>
            <input
              type="number"
              id="vendorScore"
              class="border p-2 rounded w-full"
              placeholder="0 - 100"
            />
          </div>

          <div id="vendorStatus" class="mt-3 font-bold"></div>
        </div>

        <!-- HEWAN -->
        <div class="bg-white rounded-2xl shadow p-6">
          <h3 class="font-semibold mb-4 text-green-600">Pemeriksaan Hewan</h3>

          <div class="space-y-3 checklist">
            <label><input type="checkbox" class="chk" /> Umur sesuai</label
            ><br />
            <label><input type="checkbox" class="chk" /> Tidak cacat</label
            ><br />
            <label><input type="checkbox" class="chk" /> Nafsu makan baik</label
            ><br />
            <label><input type="checkbox" class="chk" /> Suhu normal</label
            ><br />
          </div>
        </div>

        <!-- PEMOTONGAN -->
        <div class="bg-white rounded-2xl shadow p-6">
          <h3 class="font-semibold mb-4 text-red-600">Pemotongan</h3>

          <div class="space-y-3 checklist">
            <label><input type="checkbox" class="chk" /> Pisau tajam</label
            ><br />
            <label
              ><input type="checkbox" class="chk" /> Penyembelih kompeten</label
            ><br />
            <label><input type="checkbox" class="chk" /> Tidak menyiksa</label
            ><br />
          </div>
        </div>

        <!-- POST MORTEM -->
        <div class="bg-white rounded-2xl shadow p-6">
          <h3 class="font-semibold mb-4 text-purple-600">Post-Mortem</h3>

          <div class="space-y-3 checklist">
            <label><input type="checkbox" class="chk" /> Hati normal</label
            ><br />
            <label><input type="checkbox" class="chk" /> Paru normal</label
            ><br />
            <label><input type="checkbox" class="chk" /> Daging segar</label
            ><br />
          </div>
        </div>
      </div>
    </div>

    <script>
      const checkboxes = document.querySelectorAll('.chk');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const vendorScore = document.getElementById('vendorScore');
      const vendorStatus = document.getElementById('vendorStatus');

      function updateProgress() {
        let total = checkboxes.length;
        let checked = document.querySelectorAll('.chk:checked').length;
        let percent = Math.round((checked / total) * 100);

        progressBar.style.width = percent + '%';
        progressText.innerText = percent + '%';
      }

      checkboxes.forEach((cb) => cb.addEventListener('change', updateProgress));

      vendorScore.addEventListener('input', () => {
        let score = vendorScore.value;

        if (score >= 75) {
          vendorStatus.innerHTML =
            "<span class='text-green-600'>APPROVED</span>";
        } else {
          vendorStatus.innerHTML = "<span class='text-red-600'>REJECTED</span>";
        }
      });

      // Simple animation (Framer Motion fallback)
      window.onload = () => {
        const { animate } = window.motion;

        animate('div', { opacity: [0, 1], y: [20, 0] }, { duration: 0.5 });
      };
    </script>
  </body>
</html>
